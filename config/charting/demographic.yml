chart:
  type: 'pie'
  renderTo: 'demographics_chart'
  plotShadow: false
  styledMode: true
title:
  text:
  align: 'right'
  y: 60
  floating: 'true'
  style:
    color: '#000'
    fontSize: '10pt'
tooltip:
  formatter: ''
  outside: true
  useHTML: true
  className: 'demographics-tooltip'
  backgroundColor: 'transparent'
  borderWidth: 0
  shadow: false
  stickOnContact: true
  followTouchMove: true
plotOptions:
  pie:
    allowPointSelect: true
    cursor: 'pointer'
    showInLegend: true
    innerSize: '55%'
    slicedOffset: 0
    borderWidth: 2
    dataLabels:
      enabled: true
      distance: 20
      connectorColor: '#94a3b8'
      format: '{point.name}: {point.y}%'
legend:
  enabled: true
  align: 'center'
  verticalAlign: 'bottom'
  layout: 'horizontal'
  symbolRadius: 6
  symbolHeight: 12
  symbolWidth: 12
  labelFormat: '{name} ({y}%)'
  itemStyle:
    fontWeight: 'normal'
    fontSize: '12px'
credits:
  enabled: false
series: [{type: 'pie'}]
exporting:
  enabled: false
responsive:
  rules:
    - condition:
        maxWidth: 768
      chartOptions:
        plotOptions:
          pie:
            dataLabels:
              enabled: true
              distance: 15
            innerSize: '50%'
        legend:
          itemStyle:
            fontSize: '11px'
          symbolHeight: 10
          symbolWidth: 10
    - condition:
        maxWidth: 640
      chartOptions:
        plotOptions:
          pie:
            dataLabels:
              enabled: false
            innerSize: '45%'
        legend:
          itemStyle:
            fontSize: '10px'
          symbolHeight: 8
          symbolWidth: 8
